<!DOCTYPE html>
<html>
<head>
    <title>Office Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            display:flex;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#212529;
            color:white;
            padding:20px;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:10px;
            margin-bottom:10px;
        }

        .sidebar a:hover{
            background:#343a40;
        }

        .content{
            flex:1;
            padding:20px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>Dashboard</h3>

    <a href="/dashboard/">Home</a>
    <a href="/employees/">Employees</a>
    <a href="/customers/">Customers</a>
    <a href="/logout/">Logout</a>
</div>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
