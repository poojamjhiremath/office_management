{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow border-0">

            <div class="card-header bg-dark text-white">

                <h4 class="mb-0">
                    Customer Form
                </h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Customer Name
                        </label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               placeholder="Enter customer name"
                               value="{{ form.name.value|default:'' }}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Email Address
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter email address"
                               value="{{ form.email.value|default:'' }}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-bold">
                            Phone Number
                        </label>

                        <input type="text"
                               name="phone"
                               class="form-control"
                               placeholder="Enter phone number"
                               value="{{ form.phone.value|default:'' }}"
                               required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold">
                            City
                        </label>

                        <input type="text"
                               name="city"
                               class="form-control"
                               placeholder="Enter city"
                               value="{{ form.city.value|default:'' }}"
                               required>

                    </div>

                    <div class="d-flex gap-2">

                        <button type="submit" class="btn btn-success">
                            Save Customer
                        </button>

                        <a href="/customers/" class="btn btn-secondary">
                            Back
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
